<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNJB MEMBER DATA</title>
    <style>
        body { background-color: #000; color: #fff; text-align: center; font-family: sans-serif; margin: 0; padding: 0; }
        #main { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        img { width: 120px; margin-bottom: 10px; }
        button { background: red; color: white; border: none; padding: 15px 30px; font-weight: bold; border-radius: 5px; cursor: pointer; }
        #jumpscare { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .text-prank { position: absolute; bottom: 20px; width: 100%; font-size: 2em; color: yellow; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main">
        <img src="CNJB.png" alt="LOGO" onerror="this.style.display='none'">
        <h1>Welcome To CNJB</h1>
        <p>Web ini dibuat oleh Egonzz untuk mendata member!</p>
        <button onclick="startPrank()">Masukan Nama Anda</button>
    </div>

    <div id="jumpscare">
        <video id="vid" loop>
            <source src="meme.mp4" type="video/mp4">
        </video>
        <div class="text-prank">SELAMAT ANDA KENA PRANK! 😹😹</div>
    </div>

    <script>
        function startPrank() {
            // Sembunyikan main, tampilkan jumpscare
            document.getElementById('main').style.display = 'none';
            document.getElementById('jumpscare').style.display = 'block';
            
            var video = document.getElementById('vid');
            video.muted = false; // Pastikan suara nyala
            
            // Paksa play!
            var playPromise = video.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    // Jika autoplay diblokir, munculin alert dulu baru play
                    alert("KLIK OK UNTUK KONFIRMASI NAMA!");
                    video.play();
                });
            }
        }
    </script>
</body>
</html>
