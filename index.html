<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To CNJB</title>
    <style>
        /* --- CSS STYLE (Bikin Gelap & Estetik) --- */
        body {
            background-color: #121212; /* Background Gelap Mentok */
            color: #ffffff; /* Tulisan Putih Bersih */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden; /* Biar gak bisa di-scroll pas jumpscare */
        }

        /* Styling Logo CNJB */
        #logo-cnjb {
            width: 150px; /* Sesuaikan ukuran logo */
            height: auto;
            margin-bottom: 20px;
        }

        /* Styling Tulisan Welcome */
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        /* Styling Tulisan Deskripsi Egonzz */
        p {
            font-size: 1.1em;
            color: #b0b0b0; /* Abu-abu dikit biar elegan */
            margin-bottom: 30px;
            max-width: 80%;
        }

        /* Styling Tombol Pancingan */
        #btn-masuk {
            background-color: #ff4500; /* Merah Orange Menyala */
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 69, 0, 0.4);
            transition: all 0.3s ease;
        }

        #btn-masuk:hover {
            background-color: #ff6347; /* Sedikit terang pas di-hover */
            transform: scale(1.05); /* Sedikit membesar */
        }

        /* --- STYLING JUMPSCARE (Awalnya Sembunyi) --- */
